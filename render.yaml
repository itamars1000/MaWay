# Render blueprint for the route engine.
#
# How to deploy:
#   1. Push this repo to GitHub (Render deploys from a connected repo).
#   2. In Render: New → Blueprint → pick this repo. It reads this file.
#   3. After the first deploy, set ALLOWED_ORIGINS (in the service's Environment
#      tab) to your web app's URL, e.g. https://maway.vercel.app
#   4. Verify:  https://<service>.onrender.com/health
#
# Notes:
#   - runtime: docker → uses route_engine/Dockerfile (context = repo root).
#   - plan: free → $0. Tradeoffs of the free tier:
#       * 512MB RAM. Measured footprint with both regions loaded is ~245MB, so
#         it fits, with headroom for requests in covered cities (TLV/Be'er Sheva).
#         On-demand tiles for FAR, uncovered areas can spike memory and may OOM —
#         if that happens, precompute those cities (route_engine.warm) or upgrade.
#       * Sleeps after ~15 min idle; the first request then cold-starts (~30-60s).
#         The web client times out at 45s, so the very first hit after sleep may
#         fail — just retry. Upgrade to "starter" later to keep it always-on.
services:
  - type: web
    name: runroute-engine
    runtime: docker
    dockerfilePath: route_engine/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt        # closest Render region to Israel
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Set this in the Render dashboard to your web origin(s), comma-separated.
      # Left unset, the API allows all origins (fine for first smoke tests).
      - key: ALLOWED_ORIGINS
        sync: false
